<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Empresas PortalFE</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>Listado de empresas</h1>
    <table id="tbl">
        <thead>
            <tr><th>ID</th><th>CIF</th><th>Nombre</th><th>Sector</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
    fetch('/api/GetEmpresas')
      .then(r=>r.json())
      .then(data=>{
        const body=document.querySelector('#tbl tbody');
        data.forEach(e=>{
          const tr=document.createElement('tr');
          tr.innerHTML = `<td>${e.id}</td><td>${e.cif}</td><td>${e.nombre}</td><td>${e.sector}</td>`;
          body.appendChild(tr);
        });
      }).catch(console.error);
    </script>
</body>
</html>
