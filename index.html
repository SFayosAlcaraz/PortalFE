<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Empresas PortalFE</title>
    <!-- Bootstrap CDN para estilo profesional -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <style>
        body { padding: 40px; background-color: #f8f9fa; }
        h1 { margin-bottom: 20px; }
        #refreshBtn { margin-bottom: 15px; }
        table { background: white; }
    </style>
</head>
<body>
    <div class="container">
      <h1 class="text-center">Listado de empresas</h1>
      <div class="text-end mb-3">
        <button id="refreshBtn" class="btn btn-primary">Actualizar listado</button>
      </div>
      <div class="table-responsive">
        <table id="tbl" class="table table-striped table-hover">
            <thead class="table-dark">
                <tr><th>ID</th><th>CIF</th><th>Nombre</th><th>Sector</th></tr>
            </thead>
            <tbody></tbody>
        </table>
      </div>
    </div>
    <script>
    function loadEmpresas() {
      fetch('/api/GetEmpresas')
        .then(r=>r.json())
        .then(data=>{
          const body=document.querySelector('#tbl tbody');
          body.innerHTML = ''; // limpiar filas anteriores
          data.forEach(e=>{
            const tr=document.createElement('tr');
            tr.innerHTML = `<td>${e.id}</td><td>${e.cif}</td><td>${e.nombre}</td><td>${e.sector}</td>`;
            body.appendChild(tr);
          });
        }).catch(console.error);
    }

    document.getElementById('refreshBtn').addEventListener('click', loadEmpresas);
    // cargar al inicio
    loadEmpresas();
    </script>
</body>
</html>
