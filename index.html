<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Empresas PortalFE</title>
    <!-- Bootstrap CDN para estilo profesional -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <style>
        body { padding: 40px; background-color: #f8f9fa; }
        h1 { margin-bottom: 20px; }
        #refreshBtn { margin-bottom: 15px; }
        table { background: white; }
    </style>
</head>
<body>
    <div class="container">
      <h1 class="text-center">Listado de empresas</h1>
      <div class="text-end mb-3">
        <button id="refreshBtn" class="btn btn-primary">Actualizar listado</button>
      </div>      <!-- sección de estado de conexión paso a paso -->
      <div id="statusContainer" class="mb-3">
        <ul id="statusList" class="list-group">
          <li class="list-group-item">1. Pendiente</li>
          <li class="list-group-item">2. Pendiente</li>
          <li class="list-group-item">3. Pendiente</li>
        </ul>
      </div>      <div class="table-responsive">
        <table id="tbl" class="table table-striped table-hover">
            <thead class="table-dark">
                <tr><th>ID</th><th>CIF</th><th>Nombre</th><th>Sector</th></tr>
            </thead>
            <tbody></tbody>
        </table>
      </div>
    </div>
    <script>
    // helper para actualizar el texto de un paso
    function setStep(step, text, success=true) {
      const item = document.querySelector(`#statusList li:nth-child(${step})`);
      if (!item) return;
      item.textContent = text;
      item.classList.remove('list-group-item-success', 'list-group-item-danger');
      item.classList.add(success ? 'list-group-item-success' : 'list-group-item-danger');
    }

    function loadEmpresas() {
      // paso 1: inicio de petición
      setStep(1, '1. Enviando petición al endpoint /api/GetEmpresas...');
      fetch('/api/GetEmpresas')
        .then(r=>{
          setStep(2, '2. Respuesta recibida, parseando JSON...');
          return r.json();
        })
        .then(data=>{
          setStep(3, '3. Datos recibidos, mostrando en la tabla.');
          const body=document.querySelector('#tbl tbody');
          body.innerHTML = ''; // limpiar filas anteriores
          data.forEach(e=>{
            const tr=document.createElement('tr');
            tr.innerHTML = `<td>${e.id}</td><td>${e.cif}</td><td>${e.nombre}</td><td>${e.sector}</td>`;
            body.appendChild(tr);
          });
        })
        .catch(err=>{
          console.error(err);
          setStep(3, '3. Error al obtener datos: ' + err.message, false);
        });
    }

    document.getElementById('refreshBtn').addEventListener('click', loadEmpresas);
    // cargar al inicio
    loadEmpresas();
    </script>
</body>
</html>
