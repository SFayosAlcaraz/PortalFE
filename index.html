<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Empresas PortalFE</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>
    <h1>Listado de empresas</h1>
    <button id="refreshBtn">Actualizar listado</button>
    <table id="tbl">
        <thead>
            <tr><th>ID</th><th>CIF</th><th>Nombre</th><th>Sector</th></tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
    function loadEmpresas() {
      fetch('/api/GetEmpresas')
        .then(r=>r.json())
        .then(data=>{
          const body=document.querySelector('#tbl tbody');
          body.innerHTML = ''; // limpiar filas anteriores
          data.forEach(e=>{
            const tr=document.createElement('tr');
            tr.innerHTML = `<td>${e.id}</td><td>${e.cif}</td><td>${e.nombre}</td><td>${e.sector}</td>`;
            body.appendChild(tr);
          });
        }).catch(console.error);
    }

    document.getElementById('refreshBtn').addEventListener('click', loadEmpresas);
    // cargar al inicio
    loadEmpresas();
    </script>
</body>
</html>
